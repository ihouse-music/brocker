version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brokerconnect-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - brokerconnect-network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=brokerconnect
      - DB_USERNAME=brokerconnect
      - DB_PASSWORD=brokerconnect_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8080:80"

  db:
    image: mysql:8.0
    container_name: brokerconnect-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: brokerconnect
      MYSQL_USER: brokerconnect
      MYSQL_PASSWORD: brokerconnect_password
      MYSQL_ROOT_PASSWORD: root_password
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - brokerconnect-network
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    container_name: brokerconnect-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - brokerconnect-network
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    container_name: brokerconnect-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - brokerconnect-network
    depends_on:
      - app

networks:
  brokerconnect-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local